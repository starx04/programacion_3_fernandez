<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Reserva</title>
</head>
<body>
    <h1>Formulario de Reserva en el Restaurante</h1>
    <form action="/reservar" method="post">
            <form action="/reservar" method="post" autocomplete="on">
                <fieldset>
                    <legend>Datos de Reserva</legend>
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>

                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="Tu teléfono" required>

                    <label for="fecha">Fecha:</label>
                    <input type="date" id="fecha" name="fecha" required>

                    <label for="hora">Hora:</label>
                    <input type="time" id="hora" name="hora" required>

                    <label for="personas">Número de Personas:</label>
                    <input type="number" id="personas" name="personas" min="1" max="20" required>

                    <label for="mensaje">Comentarios:</label>
                    <textarea id="mensaje" name="mensaje" placeholder="Escribe tus comentarios aquí" rows="4"></textarea>

                    <input type="submit" value="Reservar">
                </fieldset>
            </form>
    </form> 
</body>
</html>
