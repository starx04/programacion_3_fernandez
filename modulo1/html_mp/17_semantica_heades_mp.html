<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú del Restaurante</title>
</head>

<body>
    <!-- Header de la página -->
    <header>
        <img src="logo.svg" alt="Logo de StarFood">
        <h1>StarFood</h1>
        <p>Menú gourmet desde 2026</p>

    </article>
