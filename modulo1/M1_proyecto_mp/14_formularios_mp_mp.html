<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Reserva - StarFood</title>
</head>
<body>
    <h1>Reserva tu mesa en StarFood</h1>
    <form action="/procesar" method="post" autocomplete="on">
        <fieldset>
            <legend>Datos de la reserva</legend>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
            <label for="personas">Nº de personas:</label>
            <input type="number" id="personas" name="personas" min="1" max="20" required>
            <label for="fecha">Fecha:</label>
            <input type="date" id="fecha" name="fecha" required>
            <label for="hora">Hora:</label>
            <input type="time" id="hora" name="hora" required>
            <label for="comentarios">Comentarios:</label>
            <textarea id="comentarios" name="comentarios" placeholder="¿Algo especial?" rows="3"></textarea>
            <input type="submit" value="Reservar">
        </fieldset>
    </form>
</body>
</html>
