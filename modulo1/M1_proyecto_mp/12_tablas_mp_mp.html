<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas en el menú - StarFood</title>
</head>
<body>
    <h1>Tablas en el menú</h1>
    <h2>Tabla de Reservas</h2>
    <table border="1">
        <tr>
            <th>Nombre</th>
            <th>Personas</th>
            <th>Hora</th>
        </tr>
        <tr>
            <td>Ana</td>
            <td>2</td>
            <td>20:00</td>
        </tr>
        <tr>
            <td>Luis</td>
            <td>4</td>
            <td>21:00</td>
        </tr>
    </table>
    <h2>Tabla de Platos</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Plato</th>
                <th>Precio</th>
                <th>Categoría</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Filete Gourmet</td>
                <td>25€</td>
                <td>Carne</td>
            </tr>
            <tr>
                <td>Pasta Carbonara</td>
                <td>18€</td>
                <td>Pasta</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">Total platos</td>
                <td>2</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
