<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparativa de Menús - StarFood</title>
</head>
<body>
  <h1>Comparativa de Menús</h1>
  <table border="1">
    <caption>Comparativa de menús especiales</caption>
    <colgroup>
      <col>
      <col style="background-color: #fff8e1;">
      <col style="background-color: #e8f5e9;">
      <col style="background-color: #e3f2fd;">
    </colgroup>
    <thead>
      <tr>
        <th scope="col">Menú</th>
        <th scope="col">Precio</th>
        <th scope="col">Incluye postre</th>
        <th scope="col">Bebida</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th scope="row">Gourmet</th>
        <td>35€</td>
        <td>Sí</td>
        <td>Vino</td>
      </tr>
      <tr>
        <th scope="row">Vegetariano</th>
        <td>28€</td>
        <td>Sí</td>
        <td>Agua/Jugo</td>
      </tr>
      <tr>
        <th scope="row">Infantil</th>
        <td>15€</td>
        <td>No</td>
        <td>Refresco</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
