<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Menú con Flexbox Justify</title>

  <link rel="stylesheet" href="09_flexbox_justify_mp.css">
</head>
<body>
    <h1 style="color: #4caf50">FLEXBOX JUSTIFY PARA MENÚ</h1>
    <h1>Ejemplos de justify-content</h1>

    <h2>flex-start (inicio)</h2>
    <div class="contenedor inicio">
        <div class="item">Pasta</div>
        <div class="item">Pollo</div>
        <div class="item">Ensalada</div>
    </div>

    <h2>flex-end (fin)</h2>
    <div class="contenedor fin">
        <div class="item">Pasta</div>
        <div class="item">Pollo</div>
        <div class="item">Ensalada</div>
    </div>

    <h2>center (centro)</h2>
    <div class="contenedor centro">
        <div class="item">Pasta</div>
        <div class="item">Pollo</div>
        <div class="item">Ensalada</div>
    </div>

    <h2>space-between</h2>
    <div class="contenedor between">
        <div class="item">Pasta</div>
        <div class="item">Pollo</div>
        <div class="item">Ensalada</div>
    </div>

    <h2>space-around</h2>
    <div class="contenedor around">
        <div class="item">Pasta</div>
        <div class="item">Pollo</div>
        <div class="item">Ensalada</div>
    </div>

    <h2>space-evenly</h2>
    <div class="contenedor evenly">
        <div class="item">Pasta</div>
        <div class="item">Pollo</div>
        <div class="item">Ensalada</div>
    </div>

    
    </div>
</body>
</html>
