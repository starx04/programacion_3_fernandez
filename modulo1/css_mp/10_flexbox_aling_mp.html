<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Menú con Flexbox Align</title>

  <link rel="stylesheet" href="10_flexbox_aling_mp.css">
</head>
<body>
    <h1 style="color: #4caf50">FLEXBOX ALIGN PARA MENÚ</h1>
     <h2>stretch (default)</h2>
  <div class="contenedor stretch">
    <div class="item">Pasta</div>
    <div class="item">Pollo</div>
    <div class="item">Ensalada</div>
  </div>

  <h2>flex-start</h2>
  <div class="contenedor inicio">
    <div class="item">Pasta</div>
    <div class="item">Pollo</div>
    <div class="item">Ensalada</div>
  </div>

  <h2>flex-end</h2>
  <div class="contenedor fin">
    <div class="item">Pasta</div>
    <div class="item">Pollo</div>
    <div class="item">Ensalada</div>
  </div>

  <h2>center</h2>
  <div class="contenedor centro">
    <div class="item">Pasta</div>
    <div class="item">Pollo</div>
    <div class="item">Ensalada</div>
  </div>

  <h2>baseline</h2>
  <div class="contenedor baseline">
    <div class="item">Pasta</div>
    <div class="item">Pollo con salsa</div>
    <div class="item">Ensalada gigante</div>
  </div>


</body>
</html>
