<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Menú sin JS + color-mix</title>

  <link rel="stylesheet" href="05_medidas.css">

</head>
<body>
    <h1 style="color: #e63946">MEDIDAS</h1>
    <div class="producto-card">Oferta Especial 20 % de descuento</div>
    <div class="producto-card2">Producto 2</div>
  <header class="header">
    <!-- Checkbox oculto -->
    <input type="checkbox" id="toggle-menu">

    <!-- Botón (label) -->
    <label for="toggle-menu" class="btn-menu">☰ Menú</label>
  </header>

  <!-- Menú controlado solo con CSS -->
  <nav class="menu-movil">
    <ul>
      <li><a href="#">Inicio</a></li>
      <li><a href="#">Servicios</a></li>
      <li><a href="#">Contacto</a></li>
    </ul>
  </nav>

    <main class="contenedor">
    <h1>Botones con color-mix</h1>

    <button class="btn-primario-suave">Suave</button>
    <button class="btn-primario-oscuro">Oscuro</button>

    <div class="gradiente-solido caja">Gradiente sólido</div>

    <div class="imagen">
      <div class="imagen-overlay">Overlay encima</div>
    </div>
    <div class="hero-banner">Hero Banner</div>
    <div class="seccion-destacados">Seccion destacados</div> 
</main>

</body>
</html>
